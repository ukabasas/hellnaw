<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Nova3D client application.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Nova3D">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Nova3D</title>
  <link rel="manifest" href="manifest.json">

  <style>
    #nova3d-loading {
      position: fixed;
      inset: 0;
      background: #0f0f0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 9999;
      font-family: sans-serif;
    }
    #nova3d-loading span {
      color: #94a3b8;
      font-size: 14px;
      letter-spacing: 0.05em;
    }
    .nova3d-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #1e293b;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: nova3d-spin 0.8s linear infinite;
    }
    @keyframes nova3d-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="nova3d-loading">
    <div class="nova3d-spinner"></div>
    <span>Nova3D</span>
  </div>
  <script>
    function removeNova3dLoading() {
      var el = document.getElementById('nova3d-loading');
      if (el) el.remove();
    }

    // Different Flutter web modes emit different readiness events. Listen for
    // both, then fall back so this shell can never trap the app behind a loader.
    window.addEventListener('flutter-first-frame', removeNova3dLoading);
    document.addEventListener('dart-app-ready', removeNova3dLoading);
    window.setTimeout(removeNova3dLoading, 8000);
  </script>
  <script>
    window.nova3dModelCache = {
      name: 'nova3d-glb-cache-v1',
      async store(src) {
        if (!src || src.startsWith('blob:') || src.startsWith('data:') || !('caches' in window)) {
          return src;
        }

        const cache = await caches.open(this.name);
        let response = await cache.match(src);

        if (!response) {
          response = await fetch(src, { mode: 'cors', credentials: 'omit' });
          if (!response.ok) {
            throw new Error('Model fetch failed: ' + response.status);
          }
          await cache.put(src, response.clone());
        }

        const blob = await response.blob();
        return URL.createObjectURL(blob);
      },
      revoke(src) {
        if (src && src.startsWith('blob:')) {
          URL.revokeObjectURL(src);
        }
      }
    };
  </script>
  <script>
    var nova3dFullscreenFrame = null;
    var nova3dPreviousBodyOverflow = '';
    var nova3dCompactRAF = null;

    function nova3dStopCompactTracking() {
      if (nova3dCompactRAF) { cancelAnimationFrame(nova3dCompactRAF); nova3dCompactRAF = null; }
    }

    // Keep the overlay aligned with the slot while in compact mode.
    // We use the SAVED rect (captured before the iframe was ever moved) as the
    // reliable source of truth, because Flutter hides the empty slot element
    // after the iframe leaves it (returning 0×0 from getBoundingClientRect).
    // The slot is still tried first — if Flutter ever keeps it live (e.g. a
    // future engine version), that gives us real-time scroll tracking.
    function nova3dStartCompactTracking(frame) {
      nova3dStopCompactTracking();
      function tick() {
        var ol = document.getElementById('nova3d-viewer-overlay');
        if (!ol) return;
        var rect = null;
        var slot = frame.__nova3dSlot;
        if (slot) {
          var sr = slot.getBoundingClientRect();
          if (sr.width > 0 && sr.height > 0) {
            rect = { top: sr.top, left: sr.left, width: sr.width, height: sr.height };
          }
        }
        if (!rect) rect = frame.__nova3dCompactRect;
        if (rect) {
          ol.style.top    = rect.top    + 'px';
          ol.style.left   = rect.left   + 'px';
          ol.style.width  = rect.width  + 'px';
          ol.style.height = rect.height + 'px';
        }
        nova3dCompactRAF = requestAnimationFrame(tick);
      }
      nova3dCompactRAF = requestAnimationFrame(tick);
    }

    function nova3dApplyCompactOverlay(frame) {
      var ol = document.getElementById('nova3d-viewer-overlay');
      if (!ol) return;
      // Clear all four inset properties so only top/left/width/height are used.
      ol.style.right = '';
      ol.style.bottom = '';
      var rect = frame.__nova3dCompactRect;
      if (rect) {
        ol.style.top    = rect.top    + 'px';
        ol.style.left   = rect.left   + 'px';
        ol.style.width  = rect.width  + 'px';
        ol.style.height = rect.height + 'px';
      }
    }

    function nova3dSetOverlayFullscreen(ol) {
      ol.style.top = '0'; ol.style.left  = '0';
      ol.style.right = '0'; ol.style.bottom = '0';
      ol.style.width = '100vw'; ol.style.height = '100vh';
    }
    window.__nova3dEditHandlers = window.__nova3dEditHandlers || {};
    window.nova3dRegisterEditHandler = function (viewerId, handler) {
      if (!viewerId || typeof handler !== 'function') return;
      window.__nova3dEditHandlers[String(viewerId)] = handler;
    };
    window.nova3dUnregisterEditHandler = function (viewerId) {
      if (viewerId) delete window.__nova3dEditHandlers[String(viewerId)];
    };

    window.addEventListener('message', function (event) {
      var data = event.data || {};

      function collectIframes(root, out) {
        if (!root) return out;
        root.querySelectorAll && root.querySelectorAll('iframe').forEach(function (iframe) {
          out.push(iframe);
        });
        root.querySelectorAll && root.querySelectorAll('*').forEach(function (el) {
          if (el.shadowRoot) collectIframes(el.shadowRoot, out);
        });
        return out;
      }

      function findNova3dFrame(source) {
        return collectIframes(document, []).find(function (candidate) {
          return candidate.contentWindow === source;
        });
      }

      if (data.type === 'nova3d-edit-request') {
        var editFrame = findNova3dFrame(event.source);
        if (!editFrame) return;
        var handler = window.__nova3dEditHandlers && window.__nova3dEditHandlers[String(data.viewerId || '')];
        if (typeof handler === 'function') {
          handler(
            String(data.requestId || ''),
            String(data.operation || ''),
            String(data.description || ''),
            String(data.partType || ''),
            JSON.stringify(data.codeArtifact || null)
          );
        }
        return;
      }

      if (data.type !== 'nova3d-viewer-fullscreen') return;
      var frame = findNova3dFrame(event.source);
      if (!frame) return;

      function notify(full) {
        try {
          frame.contentWindow.postMessage({
            type: 'nova3d-viewer-fullscreen-state',
            full: full
          }, '*');
        } catch (_) {}
      }

      function notifyWhenCurrent(full) {
        window.requestAnimationFrame(function () {
          if (frame.dataset.nova3dFullscreenState === (full ? 'full' : 'compact')) {
            notify(full);
          }
        });
      }

      if (data.action === 'enter') {
        nova3dStopCompactTracking();

        if (!frame.dataset.nova3dFullscreen) {
          // ── First enter: snapshot the iframe's current viewport rect BEFORE
          // moving it.  Flutter hides the empty slot after the iframe leaves,
          // so getBoundingClientRect() on the slot returns 0×0.  We use this
          // saved rect as the authoritative compact position.
          var snapR = frame.getBoundingClientRect();
          frame.__nova3dCompactRect = {
            top: snapR.top, left: snapR.left,
            width: snapR.width, height: snapR.height,
          };

          frame.dataset.nova3dFullscreen = 'true';
          frame.__nova3dSlot = frame.parentNode;
          nova3dPreviousBodyOverflow = document.body.style.overflow || '';

          var overlay = document.createElement('div');
          overlay.id = 'nova3d-viewer-overlay';
          overlay.style.cssText = [
            'position:fixed',
            'z-index:2147483647',
            'background:#0d0d0d',
            'display:flex',
            'align-items:stretch',
          ].join(';');
          document.body.appendChild(overlay);

          // Move the iframe.  Per the HTML spec, adopting within the same
          // document preserves the JS context.  The iframe is NEVER moved back
          // — re-inserting into Flutter's slot triggers a platform-view reload.
          overlay.appendChild(frame);
          frame.style.position    = 'relative';
          frame.style.inset       = 'auto';
          frame.style.width       = '100%';
          frame.style.height      = '100%';
          frame.style.borderRadius = '0';
        }

        nova3dFullscreenFrame = frame;
        frame.dataset.nova3dFullscreenState = 'full';
        document.body.style.overflow = 'hidden';

        var ol = document.getElementById('nova3d-viewer-overlay');
        if (ol) nova3dSetOverlayFullscreen(ol);

        // Notify the viewer to switch to full-ui mode (multiple retries for
        // any browser-specific timing quirk around DOM adoption).
        [0, 80, 250].forEach(function(ms) {
          setTimeout(function() {
            if (frame.dataset.nova3dFullscreenState !== 'full') return;
            try {
              frame.contentWindow.postMessage(
                { type: 'nova3d-viewer-fullscreen-state', full: true }, '*');
            } catch(_) {}
          }, ms);
        });
      }

      if (data.action === 'exit') {
        // ── Compact mode: shrink the overlay to the saved compact rect.
        // The iframe is NEVER moved back into Flutter's DOM.
        frame.dataset.nova3dFullscreenState = 'compact';
        document.body.style.overflow = nova3dPreviousBodyOverflow;

        // Resize the overlay synchronously so that when the viewer's
        // setViewportMode(false) runs onResize() it measures the compact size.
        nova3dApplyCompactOverlay(frame);

        // Continue tracking in case the slot rect becomes available (Flutter
        // scroll updates) — falls back to saved rect when slot is 0×0.
        nova3dStartCompactTracking(frame);

        // Send the compact notification.  postMessage is async, so by the
        // time the viewer processes it the overlay already has compact size.
        try {
          frame.contentWindow.postMessage(
            { type: 'nova3d-viewer-fullscreen-state', full: false }, '*');
        } catch(_) {}
      }
    });

    // Full teardown — called only by the ESC key or page unload, not by the
    // normal minimize button.  The iframe is discarded along with the overlay.
    function exitNova3dViewerFullscreen(frame) {
      if (!frame || !frame.dataset.nova3dFullscreen) return;
      nova3dStopCompactTracking();
      var overlay = document.getElementById('nova3d-viewer-overlay');
      if (overlay && overlay.parentNode) overlay.parentNode.removeChild(overlay);
      document.body.style.overflow = nova3dPreviousBodyOverflow;
      delete frame.dataset.nova3dFullscreen;
      delete frame.dataset.nova3dFullscreenState;
      delete frame.__nova3dSlot;
      if (nova3dFullscreenFrame === frame) nova3dFullscreenFrame = null;
    }

    window.addEventListener('keydown', function (event) {
      if (event.key !== 'Escape' || !nova3dFullscreenFrame) return;
      if (nova3dFullscreenFrame.dataset.nova3dFullscreenState !== 'full') return;
      var frame = nova3dFullscreenFrame;
      frame.dataset.nova3dFullscreenState = 'compact';
      document.body.style.overflow = nova3dPreviousBodyOverflow;
      nova3dApplyCompactOverlay(frame);
      nova3dStartCompactTracking(frame);
      try {
        frame.contentWindow.postMessage(
          { type: 'nova3d-viewer-fullscreen-state', full: false }, '*');
      } catch(_) {}
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations()
        .then((registrations) => registrations.forEach((registration) => registration.unregister()));
    }
    if ('caches' in window) {
      caches.keys().then((keys) => keys
        .filter((key) => key !== window.nova3dModelCache.name)
        .forEach((key) => caches.delete(key)));
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
