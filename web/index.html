<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Nova3D client application.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Nova3D">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Nova3D</title>
  <link rel="manifest" href="manifest.json">

  <!-- Preload the splash fonts so they're ready before paint. These are the
       same TTFs bundled into the Flutter asset bundle (assets/fonts/) so
       there's a single source of truth and no extra network traffic. -->
  <link rel="preload" as="font" type="font/ttf" crossorigin
        href="assets/assets/fonts/Silkscreen-Regular.ttf">
  <link rel="preload" as="font" type="font/ttf" crossorigin
        href="assets/assets/fonts/Silkscreen-Bold.ttf">
  <link rel="preload" as="font" type="font/ttf" crossorigin
        href="assets/assets/fonts/Inter-Regular.ttf">

  <style>
    @font-face {
      font-family: 'Silkscreen';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('assets/assets/fonts/Silkscreen-Regular.ttf') format('truetype');
    }
    @font-face {
      font-family: 'Silkscreen';
      font-style: normal;
      font-weight: 700;
      font-display: swap;
      src: url('assets/assets/fonts/Silkscreen-Bold.ttf') format('truetype');
    }
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('assets/assets/fonts/Inter-Regular.ttf') format('truetype');
    }

    html, body {
      background: #fbf3df;
      margin: 0;
      padding: 0;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    #nova3d-loading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      overflow: hidden;
      background:
        radial-gradient(#d8c89a 1.4px, transparent 1.8px) 0 0 / 28px 28px,
        #fbf3df;
      color: #1f1a3d;
      image-rendering: pixelated;
    }
    .nova3d-version {
      position: absolute;
      top: 22px;
      right: 28px;
      font-family: 'Silkscreen', 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      color: #9a8fb8;
    }
    .nova3d-stage {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .nova3d-orbit {
      position: absolute;
      top: 22%;
      left: 22%;
      width: 220px;
      height: 220px;
      margin: -110px 0 0 -110px;
      border: 2px dashed #c9bfdc;
      border-radius: 50%;
      opacity: 0.7;
      animation: nova3d-orbit 22s linear infinite;
    }
    @media (max-width: 720px) {
      .nova3d-orbit { top: 16%; left: 18%; width: 140px; height: 140px; margin: -70px 0 0 -70px; }
    }
    @keyframes nova3d-orbit { to { transform: rotate(360deg); } }
    .nova3d-mascot {
      width: 132px;
      height: 132px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      animation: nova3d-bob 2.6s ease-in-out infinite;
      filter: drop-shadow(0 6px 0 rgba(31, 26, 61, 0.08));
    }
    @keyframes nova3d-bob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-7px); }
    }
    .nova3d-wordmark {
      font-family: 'Silkscreen', 'Trebuchet MS', sans-serif;
      font-weight: 700;
      font-size: 52px;
      letter-spacing: 0;
      line-height: 1;
      margin: 8px 0 8px;
      color: #1f1a3d;
      text-shadow: 3px 3px 0 rgba(31, 26, 61, 0.06);
    }
    .nova3d-wordmark span { color: #f08aa5; }
    .nova3d-tagline {
      font-family: 'Silkscreen', 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 0.35em;
      color: #6e6390;
      margin-bottom: 22px;
    }
    .nova3d-card {
      width: min(520px, calc(100% - 64px));
      padding: 16px 22px 18px;
      background: #ffffff;
      border: 2px solid #1f1a3d;
      border-radius: 16px;
      box-shadow: 4px 4px 0 #1f1a3d;
    }
    .nova3d-card-row {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      font-size: 15px;
      color: #1f1a3d;
    }
    .nova3d-card-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f08aa5;
      box-shadow: 0 0 0 4px #fde0e8;
      flex-shrink: 0;
      animation: nova3d-pulse 1.4s ease-in-out infinite;
    }
    @keyframes nova3d-pulse {
      0%, 100% { box-shadow: 0 0 0 4px #fde0e8; }
      50%      { box-shadow: 0 0 0 6px #fbd0dc; }
    }
    .nova3d-card-status { flex: 1; }
    .nova3d-card-percent {
      font-family: 'Silkscreen', 'Courier New', monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
      color: #9a8fb8;
    }
    .nova3d-track {
      margin-top: 12px;
      height: 14px;
      background: #f3eede;
      border: 2px solid #1f1a3d;
      border-radius: 7px;
      overflow: hidden;
    }
    .nova3d-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #f8b6c8, #f08aa5);
      border-right: 2px solid #d96a89;
      transition: width 0.35s ease;
    }
    .nova3d-tip {
      margin-top: 20px;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #8a7fae;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nova3d-tip svg { display: block; }
    .nova3d-sparkle {
      position: absolute;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      animation: nova3d-twinkle 2.8s ease-in-out infinite;
    }
    @keyframes nova3d-twinkle {
      0%, 100% { opacity: 0.4; transform: scale(0.9); }
      50%      { opacity: 1;   transform: scale(1.1); }
    }
  </style>
</head>

  <script>
    (function () {
      var fillEl    = document.querySelector('.nova3d-fill');
      var pctEl     = document.querySelector('.nova3d-card-percent');
      var statusEl  = document.querySelector('.nova3d-card-status');
      var statuses  = [
        'Booting Nova3D...',
        'Warming up the renderer...',
        'Loading scene assets...',
        'Almost ready...'
      ];
      var statusIdx = 0;
      var start = performance.now();
      var done  = false;
      var raf;

      function tick(now) {
        if (done) return;
        var t   = (now - start) / 1000;
        // Asymptotic curve: climbs quickly, settles near 92% until first frame.
        var pct = Math.min(92, 92 * (1 - Math.exp(-t / 1.8)));
        var r   = Math.floor(pct);
        fillEl.style.width  = r + '%';
        pctEl.textContent   = r + '%';
        var newIdx = Math.min(statuses.length - 1, Math.floor(r / 24));
        if (newIdx !== statusIdx) {
          statusIdx = newIdx;
          statusEl.textContent = statuses[statusIdx];
        }
        raf = requestAnimationFrame(tick);
      }
      raf = requestAnimationFrame(tick);

      function fadeOutSplash() {
        var el = document.getElementById('nova3d-loading');
        if (!el) return;
        el.style.transition = 'opacity 0.35s ease';
        el.style.opacity = '0';
        setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 380);
      }

      // flutter-first-frame fires only after Flutter has painted its first frame,
      // so the loader disappears exactly when the app is visible. The timeout is
      // a safety net for browsers where the event somehow doesn't fire.
      function complete() {
        if (done) return;
        done = true;
        if (raf) cancelAnimationFrame(raf);
        fillEl.style.width = '100%';
        pctEl.textContent  = '100%';
        statusEl.textContent = 'Ready';
        setTimeout(fadeOutSplash, 260);
      }
      window.addEventListener('flutter-first-frame', complete);
      window.setTimeout(complete, 12000);
    })();
  </script>
  <script>
    window.nova3dModelCache = {
      name: 'nova3d-glb-cache-v1',
      async store(src) {
        if (!src || src.startsWith('blob:') || src.startsWith('data:') || !('caches' in window)) {
          return src;
        }

        const cache = await caches.open(this.name);
        let response = await cache.match(src);

        if (!response) {
          let fetchResp;
          try { fetchResp = await fetch(src, { mode: 'cors', credentials: 'omit' }); }
          catch (e) { return null; }
          if (!fetchResp.ok) { return null; }  // expired SAS or auth error — signal Dart to refresh
          await cache.put(src, fetchResp.clone());
          response = fetchResp;
        }

        const blob = await response.blob();
        return URL.createObjectURL(blob);
      },
      revoke(src) {
        if (src && src.startsWith('blob:')) {
          URL.revokeObjectURL(src);
        }
      }
    };
  </script>

    var nova3dFullscreenFrame = null;
    var nova3dPreviousBodyOverflow = '';
    var nova3dCompactRAF = null;

    function nova3dStopCompactTracking() {
      if (nova3dCompactRAF) { cancelAnimationFrame(nova3dCompactRAF); nova3dCompactRAF = null; }
    }

    // Keep the overlay aligned with the slot while in compact mode.
    // We use the SAVED rect (captured before the iframe was ever moved) as the
    // reliable source of truth, because Flutter hides the empty slot element
    // after the iframe leaves it (returning 0×0 from getBoundingClientRect).
    // The slot is still tried first — if Flutter ever keeps it live (e.g. a
    // future engine version), that gives us real-time scroll tracking.
    function nova3dStartCompactTracking(frame) {
      nova3dStopCompactTracking();
      function tick() {
        var ol = document.getElementById('nova3d-viewer-overlay');
        if (!ol) return;
        var rect = null;
        var slot = frame.__nova3dSlot;
        if (slot) {
          var sr = slot.getBoundingClientRect();
          if (sr.width > 0 && sr.height > 0) {
            rect = { top: sr.top, left: sr.left, width: sr.width, height: sr.height };
          }
        }
        if (!rect) rect = frame.__nova3dCompactRect;
        if (rect) {
          ol.style.top    = rect.top    + 'px';
          ol.style.left   = rect.left   + 'px';
          ol.style.width  = rect.width  + 'px';
          ol.style.height = rect.height + 'px';
        }
        nova3dCompactRAF = requestAnimationFrame(tick);
      }
      nova3dCompactRAF = requestAnimationFrame(tick);
    }

    function nova3dApplyCompactOverlay(frame) {
      var ol = document.getElementById('nova3d-viewer-overlay');
      if (!ol) return;
      // Clear all four inset properties so only top/left/width/height are used.
      ol.style.right = '';
      ol.style.bottom = '';
      var rect = frame.__nova3dCompactRect;
      if (rect) {
        ol.style.top    = rect.top    + 'px';
        ol.style.left   = rect.left   + 'px';
        ol.style.width  = rect.width  + 'px';
        ol.style.height = rect.height + 'px';
      }
    }

    function nova3dSetOverlayFullscreen(ol) {
      ol.style.top = '0'; ol.style.left  = '0';
      ol.style.right = '0'; ol.style.bottom = '0';
      ol.style.width = '100vw'; ol.style.height = '100vh';
    }
    window.__nova3dEditHandlers = window.__nova3dEditHandlers || {};
    window.nova3dRegisterEditHandler = function (viewerId, handler) {
      if (!viewerId || typeof handler !== 'function') return;
      window.__nova3dEditHandlers[String(viewerId)] = handler;
    };
    window.nova3dUnregisterEditHandler = function (viewerId) {
      if (viewerId) delete window.__nova3dEditHandlers[String(viewerId)];
      // If the viewer being disposed owns the fullscreen overlay, remove it.

        if (overlay && overlay.parentNode) overlay.parentNode.removeChild(overlay);
        nova3dFullscreenFrame = null;
      }
    };

    window.addEventListener('message', function (event) {
      var data = event.data || {};

      function collectIframes(root, out) {
        if (!root) return out;
        root.querySelectorAll && root.querySelectorAll('iframe').forEach(function (iframe) {
          out.push(iframe);
        });
        root.querySelectorAll && root.querySelectorAll('*').forEach(function (el) {
          if (el.shadowRoot) collectIframes(el.shadowRoot, out);
        });

      }

      function findNova3dFrame(source) {
        return collectIframes(document, []).find(function (candidate) {
          return candidate.contentWindow === source;
        });

        var editFrame = findNova3dFrame(event.source);

              type: 'nova3d-edit-result',
              requestId: String(data.requestId || '')

          status: 'running',
          message: 'Nova3D received the edit request. Preparing workflow...'
        });

        if (typeof handler === 'function') {

              requestId: String(data.requestId || ''),
              operation: String(data.operation || ''),
              description: String(data.description || ''),
              partType: String(data.partType || ''),
              codeArtifact: data.codeArtifact || null,
              sourceWorkflowId: String(data.sourceWorkflowId || ''),
              modelOptionId: String(data.modelOptionId || '')
            }));
          } catch (err) {
