name: Windows Build & Release

on:
  push:
    tags:
      - 'v*' # Triggers the workflow when a tag like 'v1.0.0' is pushed
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  build-and-release:
    name: Build & Release Windows
    runs-on: windows-latest
    
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # Uses the latest stable Flutter release automatically

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Windows Desktop Support
        run: flutter config --enable-windows-desktop

      - name: Build Windows Release
        run: flutter build windows --release

      - name: Zip the build artifacts
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath Nova3D-Windows.zip

      - name: Create GitHub Release and Upload Artifact
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Nova3D-Windows.zip
          generate_release_notes: true
